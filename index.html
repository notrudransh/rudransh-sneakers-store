<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rudransh Sneakers Store</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  scroll-behavior:smooth;
  overflow-x:hidden;
}


header{
  background:#000;
  color:#fff;
  text-align:center;
  padding:20px;
}

header h1{
  font-size:clamp(1.6rem,4vw,2.5rem);
}



nav{
  background:linear-gradient(45deg,#111,#333);
  padding:12px;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}

nav a{
  color:white;
  text-decoration:none;
  font-size:16px;
}


.hero{
  text-align:center;
  padding:30px 15px;
}

.hero h2{
  margin-bottom:20px;
}

.hero-gallery{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:15px;
}

.hero-gallery img{
  width:min(280px,90vw);
  height:220px;
  object-fit:cover;
  border-radius:12px;
}



.search-box{
  text-align:center;
  padding:15px;
}

.search-box input{
  width:min(400px,95%);
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}



.filter{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}



.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.item{
  background:white;
  border-radius:12px;
  padding:15px;
  box-shadow:0 5px 15px rgba(0,0,0,.15);
  text-align:center;
  transition:.3s;
}

.item:hover{
  transform:translateY(-5px);
}

.item img{
  width:100%;
  height:220px;
  object-fit:cover;
  border-radius:10px;
}

.item h3{
  margin-top:10px;
}

.item p{
  font-weight:bold;
  margin:10px 0;
}

select{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
}



button{
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  color:white;
  background:linear-gradient(45deg,#000,#444);
}

button:hover{
  background:linear-gradient(45deg,#ff0000,#ff7b00);
}



.cart{
  position:fixed;
  top:100px;
  right:15px;
  width:300px;
  background:white;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,.2);
  max-height:75vh;
  overflow-y:auto;
  z-index:1000;
}

.cart h3{
  margin-bottom:10px;
}

.cart-item{
  border-bottom:1px solid #ddd;
  padding:10px 0;
}

.cart-item button{
  width:auto;
  padding:4px 10px;
}



#toast{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:black;
  color:white;
  padding:12px 20px;
  border-radius:8px;
  display:none;
}



footer{
  margin-top:30px;
  background:black;
  color:white;
  text-align:center;
  padding:20px;
}



@media(max-width:1024px){

  .cart{
    position:static;
    width:95%;
    margin:20px auto;
    max-height:none;
  }

}

@media(max-width:768px){

  nav{
    flex-direction:column;
  }

  .container{
    grid-template-columns:1fr;
  }

  .hero-gallery img{
    width:100%;
    max-width:350px;
    height:auto;
  }

}

</style>
</head>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

function addToCart(name,price,colorId,sizeId,btn){

let color = document.getElementById(colorId).value;

let size = document.getElementById(sizeId).value;

cart.push({
name,
price,
color,
size
});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

btn.innerHTML = "Added ✅";

showToast(name + " added to cart");

}

function renderCart(){

let box = document.getElementById("cart-items");

let total = 0;

box.innerHTML = "";

cart.forEach((item,index)=>{

total += item.price;

box.innerHTML += `
<div class="cart-item">

<b>${item.name}</b><br>

${item.color} | Size ${item.size}<br>

₹${item.price}

<br>

<button onclick="removeItem(${index})">
Remove
</button>

</div>
`;

});

document.getElementById("total").innerText = total;

}

function removeItem(index){

cart.splice(index,1);

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

renderCart();

}

function showToast(msg){

let toast = document.getElementById("toast");

toast.innerHTML = msg;

toast.style.display = "block";

setTimeout(()=>{

toast.style.display = "none";

},2000);

}

function filterItems(brand){

let items = document.querySelectorAll(".item");

items.forEach(item=>{

if(
brand === "all" ||
item.dataset.brand === brand
){

item.style.display = "block";

}else{

item.style.display = "none";

}

});

}

function searchItem(value){

let items = document.querySelectorAll(".item");

items.forEach(item=>{

let text = item
.querySelector("h3")
.innerText
.toLowerCase();

if(
text.includes(
value.toLowerCase()
)
){

item.style.display = "block";

}else{

item.style.display = "none";

}

});

}

function fakePayment(){

alert("Payment Successful ✅");

cart = [];

localStorage.removeItem("cart");

renderCart();

}

function sendWhatsApp(){

if(cart.length === 0){

alert("Cart is empty!");

return;

}

let msg = "Order Details:%0A";

cart.forEach(item=>{

msg +=
`${item.name}
(${item.color},
Size ${item.size})
- ₹${item.price}%0A`;

});

let total = cart.reduce(
(sum,item)=>sum+item.price,
0
);

msg += `%0ATotal: ₹${total}`;

window.open(
`https://wa.me/919584037423?text=${msg}`,
"_blank"
);

}

window.onload = renderCart;

</script>
